<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Bot Settings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #888888);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container { max-width: 400px; margin: 0 auto; }
        h3 { margin-top: 0; margin-bottom: 20px; font-size: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            box-sizing: border-box;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }
        .hint { font-size: 12px; color: var(--hint-color); margin-top: 6px; }
        button {
            width: 100%; padding: 14px;
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>⚙️ WB Integration Settings</h3>

        <div class="form-group">
            <label for="wb_token">API Token (Supplies):</label>
            <input type="text" id="wb_token" placeholder="x64 token string...">
        </div>

        <div class="form-group">
            <label for="period_days">Search drafts created within:</label>
            <select id="period_days">
                <option value="1" selected>Last 24 hours (1 day)</option>
                <option value="2">Last 2 days</option>
                <option value="3">Last 3 days</option>
                <option value="5">Last 5 days</option>
                <option value="7">Last 7 days</option>
                <option value="14">Last 14 days</option>
                <option value="30">Last 30 days</option>
            </select>
            <div class="hint">Filter active WB drafts by their creation timestamp.</div>
        </div>

        <button onclick="saveSettings()">Save Settings</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function saveSettings() {
            const token = document.getElementById('wb_token').value.trim();
            const period = document.getElementById('period_days').value;
            
            if (!token) {
                alert('Please enter your Wildberries API token.');
                return;
            }
            
            // Отправляем объект с токеном и периодом обратно боту
            const data = { 
                wb_token: token,
                period_days: period
            };
            
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
