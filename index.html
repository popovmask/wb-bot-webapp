<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Bot Settings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #888888);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            box-sizing: border-box;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--button-color);
        }

        .hint {
            font-size: 12px;
            color: var(--hint-color);
            margin-top: 6px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button:active {
            opacity: 0.8;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            background: #e2e8f0;
            color: #4a5568;
            display: inline-block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>⚙️ WB Integration Settings</h3>
        
        <div id="status" class="status-badge">Connecting to Telegram...</div>

        <div class="form-group">
            <label for="wb_token">API Token (Supplies / Поставки):</label>
            <input type="text" id="wb_token" placeholder="x64 token string...">
            <div class="hint">The token remains on your secure server database.</div>
        </div>

        <button id="save_btn" onclick="saveSettings()">Save Settings</button>
    </div>

    <script>
        // Инициализируем объект WebApp
        const tg = window.Telegram.WebApp;

        // Сообщаем Telegram, что приложение полностью загрузилось и готово к отрисовке
        try {
            tg.ready();
            tg.expand(); // Раскрываем окно на максимум
            
            // Если объект WebApp существует, меняем статус
            if (tg.initData) {
                document.getElementById('status').innerText = "Telegram API: Connected";
                document.getElementById('status').style.backgroundColor = "#d4edda";
                document.getElementById('status').style.color = "#155724";
            } else {
                document.getElementById('status').innerText = "Opened outside Telegram Browser";
            }
        } catch (e) {
            document.getElementById('status').innerText = "API Error: " + e.message;
            document.getElementById('status').style.backgroundColor = "#f8d7da";
            document.getElementById('status').style.color = "#721c24";
        }

        function saveSettings() {
            const token = document.getElementById('wb_token').value.trim();
            if (!token) {
                alert('Please enter your Wildberries API token.');
                return;
            }
            
            const data = { wb_token: token };
            
            try {
                // Отправляем JSON-строку обратно боту в чат
                tg.sendData(JSON.stringify(data));
                // Закрываем окно Web App вручную, если Telegram не закрыл его сам
                tg.close();
            } catch (err) {
                alert("Failed to send data to bot: " + err.message);
            }
        }
    </script>
</body>
</html>
